# Compare vLLM serving configurations with fixed TTFT and token-throughput workload contracts.
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: vllm-config-performance-benchmark
spec:
  composition:
    apiVersion: graphblocks.ai/composition/v1alpha1
    imports:
      collection:
        path: fragments/collect-performance.yaml
      evaluation:
        path: fragments/evaluate-performance.yaml
    slots:
      performance-collection:
        interface:
          inputs:
            matrix: graphblocks.evaluation/VllmBenchmarkMatrix@1
          outputs:
            baseline: graphblocks.evaluation/BenchmarkVariantId@1
            candidate: graphblocks.evaluation/BenchmarkVariantId@1
            samples: graphblocks.evaluation/PerformanceSamples@1
        fill:
          fragment: collection/collect-performance
      performance-evaluation:
        interface:
          inputs:
            samples: graphblocks.evaluation/PerformanceSamples@1
            baseline: graphblocks.evaluation/BenchmarkVariantId@1
            candidate: graphblocks.evaluation/BenchmarkVariantId@1
          outputs:
            report: graphblocks.evaluation/BenchmarkReport@1
        fill:
          fragment: evaluation/evaluate-performance
  interface:
    inputs:
      matrix: graphblocks.evaluation/VllmBenchmarkMatrix@1
    outputs:
      report: graphblocks.evaluation/BenchmarkReport@1
  nodes:
    collect:
      slot: performance-collection
      inputs:
        matrix: $input.matrix
    evaluate:
      slot: performance-evaluation
      inputs:
        samples: collect.samples
        baseline: collect.baseline
        candidate: collect.candidate
      outputs:
        report: $output.report
