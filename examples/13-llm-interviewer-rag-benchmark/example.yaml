# LLM-as-an-interviewer benchmark composed from setup, answer, and evaluation subgraphs.
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: rag-interviewer-benchmark
spec:
  composition:
    apiVersion: graphblocks.ai/composition/v1alpha1
    imports:
      setup:
        path: fragments/interview-setup.yaml
      variants:
        path: fragments/answer-variants.yaml
      evaluation:
        path: fragments/blind-evaluation.yaml
      resources:
        path: binding.yaml
    slots:
      setup:
        interface:
          inputs:
            dataset: graphblocks.evaluation/InterviewDatasetRef@1
          outputs:
            reference: graphblocks.evaluation/InterviewReference@1
            chunks: graphblocks.ai/DocumentChunkList@1
            questions: graphblocks.evaluation/InterviewQuestionSet@1
        fill:
          fragment: setup/interview-setup
      variants:
        interface:
          inputs:
            questions: graphblocks.evaluation/InterviewQuestionSet@1
            chunks: graphblocks.ai/DocumentChunkList@1
          outputs:
            rag: graphblocks.evaluation/AnswerSet@1
            noRag: graphblocks.evaluation/AnswerSet@1
        fill:
          fragment: variants/answer-variants
      evaluation:
        interface:
          inputs:
            questions: graphblocks.evaluation/InterviewQuestionSet@1
            reference: graphblocks.evaluation/InterviewReference@1
            rag: graphblocks.evaluation/AnswerSet@1
            noRag: graphblocks.evaluation/AnswerSet@1
          outputs:
            report: graphblocks.evaluation/BenchmarkReport@1
        fill:
          fragment: evaluation/blind-evaluation
  interface:
    inputs:
      dataset: graphblocks.evaluation/InterviewDatasetRef@1
    outputs:
      report: graphblocks.evaluation/BenchmarkReport@1
  nodes:
    setup:
      slot: setup
    variants:
      slot: variants
    evaluation:
      slot: evaluation
  edges:
    - from: $input.dataset
      to: setup.dataset
    - from: setup.questions
      to: variants.questions
    - from: setup.chunks
      to: variants.chunks
    - from: setup.questions
      to: evaluation.questions
    - from: setup.reference
      to: evaluation.reference
    - from: variants.rag
      to: evaluation.rag
    - from: variants.noRag
      to: evaluation.noRag
    - from: evaluation.report
      to: $output.report
