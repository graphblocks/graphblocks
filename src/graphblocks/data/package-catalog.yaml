catalogVersion: 4
specVersion: '1.0'
defaultMetaPackage:
  distribution: graphblocks
  ownsImportPackage: false
  dependencies:
  - graphblocks-core~=1.0
  - graphblocks-runtime~=1.0
  - graphblocks-stdlib~=1.0
  - graphblocks-documents~=1.0
  - graphblocks-rag~=1.0
  - graphblocks-conversation~=1.0
  - graphblocks-policy~=1.0
  - graphblocks-budget~=1.0
  - graphblocks-usage~=1.0
  - graphblocks-cli~=1.0
  excludedCategories:
  - model_provider
  - cloud_sdk
  - database_client
  - document_parser
  - ocr_engine
  - web_server
  - tui
  - kubernetes
  - terraform
  - voice
  - durable_stream
  - external_policy_engine
  - distributed_ledger_backend
  notes:
  - Policy, budget, and usage default packages provide only provider-neutral contracts
    and local in-memory/SQLite development implementations.
  - Distributed ledgers, external PDPs, providers, parsers, cloud SDKs, servers, voice,
    and deployment adapters remain optional.
releaseTrains:
  foundation:
    minorVersionCoordinated: true
    packages:
    - graphblocks-core
    - graphblocks-runtime
    - graphblocks-stdlib
    - graphblocks-documents
    - graphblocks-rag
    - graphblocks-conversation
    - graphblocks-policy
    - graphblocks-budget
    - graphblocks-usage
    - graphblocks-testing
  firstPartyExtensions:
    minorVersionCoordinated: false
    packages:
    - graphblocks-agents
    - graphblocks-evaluation
    - graphblocks-orchestration
    - graphblocks-review
    - graphblocks-workspace
    - graphblocks-client
    - graphblocks-tui
    - graphblocks-cli
    - graphblocks-server
    - graphblocks-worker
    - graphblocks-deployment
    - graphblocks-telemetry
    - graphblocks-devtools
    - graphblocks-oci
    - graphblocks-kubernetes
    - graphblocks-terraform
    - graphblocks-gitops
    - graphblocks-operator
    - graphblocks-otel
    - graphblocks-langfuse
    - graphblocks-audit
    - graphblocks-prometheus
    - graphblocks-dashboards
    compatibilityBy:
    - requires_core
    - requires_runtime_protocol
    - plugin_api
    - schema_api
    - policy_api
    - ledger_api
  integrations:
    minorVersionCoordinated: false
    compatibilityBy:
    - requires_core
    - requires_runtime_protocol
    - plugin_api
    - schema_api
    - policy_api
    - ledger_api
