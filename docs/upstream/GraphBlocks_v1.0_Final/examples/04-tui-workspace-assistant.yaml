apiVersion: graphblocks.ai/v1alpha1
kind: Application
metadata:
  name: workspace-assistant
spec:
  surfaces:
    default:
      kind: tui
      implementation: textual
      protocol: graphblocks.app.v1
  graphs:
    default: graphs/workspace-agent.yaml
  capabilities:
    - assistant_drafts
    - approval
    - run_cancellation
    - artifact_preview
    - breakpoint_resume
---
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: workspace-agent
spec:
  interface:
    inputs:
      turn: company.workspace/TurnRequest@1
    outputs:
      result: graphblocks.ai/TurnResult@1
    events:
      - graphblocks.app/AssistantDraftDelta@1
      - graphblocks.app/ApprovalRequested@1
      - graphblocks.workspace/FilePatchPreview@1
  nodes:
    snapshot:
      block: workspace.snapshot@1
      inputs: {workspace: $input.turn.workspace}
    context:
      block: workspace.context@1
      inputs:
        snapshot: snapshot.value
        selection: $input.turn.selection
        message: $input.turn.message
    agent:
      block: agent.run@1
      inputs:
        messages: $input.turn.history
        context: context.pack
      bindings: {model: coding-model}
      config:
        tools:
          - workspace.search
          - workspace.read
          - workspace.propose_changeset
          - workspace.run_checks
          - git.diff
        maxSteps: 20
        approval:
          workspace.commit_changeset: required
          process.execute: required
    candidate:
      block: conversation.make_turn_candidate@1
      inputs: {agent: agent.result}
