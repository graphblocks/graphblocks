releaseGates:
  - id: REL-API-SNAPSHOT
    description: Stable Python signatures and CLI JSON and exit-code contracts are snapshotted.
    readiness: candidate-enforced
    evidence:
      - compatibility/stable-python-surface.yaml
      - compatibility/stable-python-api.json
      - compatibility/stable-cli-cases.yaml
      - compatibility/stable-cli-contracts.json
      - compatibility/stable-testing-surface.yaml
      - compatibility/stable-testing-api.json
      - compatibility/stable-testing-cli-cases.yaml
      - compatibility/stable-testing-cli-contracts.json
      - tools/check_compatibility.py
    blockers: [compatibility-review]
  - id: REL-WIRE-V1
    description: Closed graphblocks.ai/v1 Graph and PluginManifest resources and alpha migrations exist.
    readiness: candidate-enforced
    evidence:
      - schemas/graphblocks.ai/v1/graph.schema.json
      - schemas/graphblocks.ai/v1/plugin-manifest.schema.json
      - src/graphblocks/migration.py
      - tests/test_migration.py
      - tck/migration/cases.json
  - id: REL-CLOSED-SCHEMA
    description: Every stable resource is validated by every claimed stable reader.
    readiness: candidate-enforced
    evidence:
      - schemas/graphblocks.ai/v1/graph.schema.json
      - schemas/graphblocks.ai/v1/plugin-manifest.schema.json
      - src/graphblocks/schema.py
      - src/graphblocks/plugins.py
      - tests/test_schema_values.py
      - tests/test_plugins.py
      - tck/schema/resources.json
  - {id: REL-CLOSED-WORLD, description: Unknown blocks fail compilation by default and discovery is explicitly opt-in.}
  - {id: REL-DIAGNOSTICS, description: All stable diagnostics are registered and compatibility-tested.}
  - id: REL-TRACEABILITY
    description: Every stable normative requirement has executable evidence.
    readiness: candidate-enforced
    evidence:
      - src/graphblocks/data/conformance-profiles.yaml
      - docs/project/stable-requirements.yaml
      - tests/test_stable_traceability.py
  - {id: REL-RUNTIME-CORRECTNESS, description: C1 lifecycle cancellation journal bounded-flow and tool gates pass.}
  - id: REL-INSTALLED-TCK
    description: Digest-bound TCK and acceptance evidence comes from installed release artifacts.
    readiness: candidate-enforced
    evidence:
      - tools/verify_wheelhouse.py
      - tests/test_wheelhouse_schema_verification.py
      - .github/workflows/ci.yml
  - id: REL-PLATFORM-MATRIX
    description: Install typing and runtime gates pass on every published platform; upgrade is explicitly exempt only for v1.0.0.
    readiness: candidate-enforced-with-first-stable-upgrade-exemption
    platforms:
      operatingSystems: [ubuntu-latest, windows-latest]
      pythonVersions: ['3.11', '3.12']
    codeEnforced:
      - source tests typing and runtime checks on every platform combination
      - pinned-Rust wheel build and clean offline install on every platform combination
      - installed-artifact TCK and acceptance evidence on every platform combination
      - retained digest-bound evidence per platform combination
      - final v1.0.0 promotion evidence carries the closed first-stable-release upgrade exemption
    evidence:
      - tools/verify_wheelhouse.py
      - .github/workflows/ci.yml
    blockers: []
  - id: REL-SUPPLY-CHAIN
    description: Checksums SBOM provenance signatures publish and rollback are verified.
    readiness: promotion-contract-enforced-external-evidence-absent
    requiredExternalEvidencePath: docs/project/releases/v1.0.0-promotion-evidence.json
    evidence:
      - tools/verify_wheelhouse.py
      - tools/release_supply_chain.py
      - tests/test_wheelhouse_schema_verification.py
      - tests/test_release_supply_chain.py
      - .github/workflows/ci.yml
    codeEnforced:
      - separate first-party publish artifacts and third-party install-only dependency wheels
      - exact four-platform aggregation with deterministic universal-wheel deduplication
      - canonical artifact SHA-256 manifest
      - pinned CycloneDX SBOM generation with exact wheel filename and hash bindings
      - required runtime dependency components and preserved CycloneDX dependency relationships
      - checked-in suite case fixture implementation version and acceptance evidence validation
      - git/artifact/platform/TCK/acceptance/SBOM/tool-bound in-toto SLSA provenance
      - pinned pip build hatchling maturin CycloneDX Rust and Cosign tool identities
      - exact CPython patch platform runner-image and resolved build-distribution identities
      - exact v1.0.0 or canonical positive-integer rc ref gate before OIDC admission
      - unsigned source build aggregation and verification with no OIDC permission
      - source-free OIDC signing job with only id-token write permission
      - full-commit action pins and pinned Cosign release inside the OIDC boundary
      - fixed manifest path issuer and GraphBlocks workflow/ref identity verification directly with Cosign
      - in-closure non-symlink Sigstore bundle and descriptor-backed snapshot verification
      - zero-mutation publish rollback yank and restore rehearsal
      - fail-closed self-contained bundle verification
      - final-ref-only regular non-symlink canonical promotion-evidence admission
      - exact final ref/version evidence plus manifest-bound final commit/tree
      - distinct ancestor prior-RC manifest and digest-bound release-metadata-only source diff
      - three distinct complete supported-matrix attestations and fourteen-day two-application soak validation
      - distinct approved API/security review and zero critical/high defect or unexplained-flake validation
      - protected-final-ref and authorized real staged publish rollback yank restore validation
      - promotion evidence manifest provenance standalone-verification and signed-file-closure binding
      - promotion-authorized final readiness remains signature-required
    blockers:
      - protected-release-ref-signature
      - three-clean-supported-matrix-attestations
      - fourteen-day-two-application-soak
      - independent-api-and-security-reviews
      - zero-critical-high-defects-and-unexplained-flakes
      - protected-final-ref-attestation
      - authorized-real-staged-publish-rollback-yank-restore-rehearsal
      - promotion-evidence-record-at-fixed-path
  - {id: REL-RC-SOAK, description: An unchanged RC completes independent review and a two-to-four-week application soak.}
