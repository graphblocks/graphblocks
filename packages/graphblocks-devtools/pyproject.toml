[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "graphblocks-devtools"
version = "0.1.0"
description = "Developer tooling contracts for GraphBlocks visualization, migration, profiling, and codegen"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
  { name = "GraphBlocks contributors" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = ["graphblocks-core~=0.1", "graphblocks-cli~=0.1"]

[tool.hatch.build.targets.wheel]
packages = ["src/graphblocks_devtools"]
