apiVersion: graphblocks.ai/acceptance/v1alpha1
kind: AcceptanceApplicationSet
metadata:
  name: graphblocks-core-acceptance
  version: 1.0.0
spec:
  applications:
  - id: coding-agent-background-callbacks
    profiles:
    - GB-C4-PRODUCTION
    scenarioPath: acceptance/scenarios/coding-agent-background-callbacks.yaml
    gates:
    - graphblocks validate
    - accepted invocation handle check
    - cursor replay after detach
    - callback journal-before-resume check
    - signed webhook delivery check
    description: Background coding agent task with accepted invocation, replayable run events, async CI callback resume, signed callback subscription, review, and CAS commit.
  - id: bounded-research-orchestrator
    profiles:
    - GB-X1-ORCHESTRATION
    scenarioPath: acceptance/scenarios/bounded-research-orchestrator.yaml
    gates:
    - graphblocks validate
    - graphblocks plan --expand
    - bounded task plan check
    - task budget delegation check
    - replan patch CAS check
    description: Bounded research orchestration with worker pool resolution, task plan validation, per-task checkpointing, budget pressure handling, replanning, and independent verification.
  - id: direct-file-analysis
    profiles:
    - GB-C2-AI-APPLICATION
    scenarioPath: acceptance/scenarios/direct-file-analysis.yaml
    gates:
    - graphblocks validate
    - graphblocks plan --expand
    - source reference check
    - generated artifact check
    description: Direct multi-format file analysis with source references and a generated artifact.
  - id: document-ingestion
    profiles:
    - GB-C2-AI-APPLICATION
    scenarioPath: acceptance/scenarios/document-ingestion.yaml
    gates:
    - graphblocks validate
    - graphblocks plan --expand
    - parser fallback check
    - ACL propagation check
    description: Incremental document ingestion with parser fallback, per-item budget, checkpoint, staging index, publish, delete, and ACL propagation.
  - id: enterprise-rag
    profiles:
    - GB-C2-AI-APPLICATION
    scenarioPath: docs/upstream/GraphBlocks_v1.0_Final/examples/01-enterprise-federated-rag.yaml
    gates:
    - graphblocks validate
    - graphblocks plan --expand
    - rag citation validation
    - abstention check
    description: Federated enterprise RAG with dense and keyword retrieval, fusion, rerank, budgeted context, abstention, and citation checks.
  - id: kubernetes-canary
    profiles:
    - GB-C4-PRODUCTION
    scenarioPath: docs/upstream/GraphBlocks_v1.0_Final/examples/08-kubernetes-production-deployment.yaml
    gates:
    - graphblocks validate
    - release bundle verification
    - canary quality gate
    - rollback and drain gate
    description: GraphRelease build, Kubernetes execution groups, canary quality and policy gate, rollback, and drain.
  - id: multi-turn-chat
    profiles:
    - GB-C2-AI-APPLICATION
    scenarioPath: acceptance/scenarios/multi-turn-chat.yaml
    gates:
    - graphblocks validate
    - graphblocks plan --expand
    - conversation CAS check
    - draft retract commit check
    description: Multi-turn chatbot with attachment handling, regenerate and branch, CAS, draft/retract/commit, and quota profiles.
  - id: realtime-voice-agent
    profiles:
    - GB-X2-VOICE
    scenarioPath: docs/upstream/GraphBlocks_v1.0_Final/examples/10-realtime-voice-extension.yaml
    gates:
    - graphblocks validate
    - duplex session contract check
    - interruption authority check
    - playback ledger check
    description: Realtime duplex voice agent with provider turn-detection authority, local VAD metrics, adaptive interruption, playout acknowledgements, and voice-session telemetry.
  - id: telemetry-outage-correctness
    profiles:
    - GB-C4-PRODUCTION
    scenarioPath: docs/upstream/GraphBlocks_v1.0_Final/examples/09-observability-profile.yaml
    gates:
    - graphblocks validate
    - OTel projection check
    - Langfuse projection check
    - telemetry outage correctness check
    description: OTel and Langfuse projection while audit, usage, budget, and recovery remain correct when telemetry is unavailable.
  - id: verified-rtl-workspace-trial
    profiles:
    - GB-C3-GOVERNED-RUNTIME
    scenarioPath: docs/upstream/GraphBlocks_v1.0_Final/examples/07-verified-rtl-workspace-trial.yaml
    gates:
    - graphblocks validate
    - budget lease reservation check
    - review invalidation check
    - governed trial commit gate
    description: Verified workspace trial using budgeted EDA leases, sandboxed candidate evaluation, review invalidation, gate evaluation, and compare-and-swap changeset commit.
