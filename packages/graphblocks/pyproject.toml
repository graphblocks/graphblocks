[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "graphblocks"
version = "0.1.0"
description = "Reserved alpha metapackage for GraphBlocks"
readme = "METAPACKAGE.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
  { name = "GraphBlocks contributors" },
]
keywords = ["ai", "workflow", "rag", "graph", "runtime", "contracts"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "graphblocks-core~=0.1",
  "graphblocks-runtime~=0.1",
  "graphblocks-stdlib~=0.1",
  "graphblocks-documents~=0.1",
  "graphblocks-rag~=0.1",
  "graphblocks-conversation~=0.1",
  "graphblocks-policy~=0.1",
  "graphblocks-budget~=0.1",
  "graphblocks-usage~=0.1",
  "graphblocks-cli~=0.1",
]

[project.urls]
Homepage = "https://github.com/graphblocks/graphblocks"
Documentation = "https://github.com/graphblocks/graphblocks/tree/main/docs"
Source = "https://github.com/graphblocks/graphblocks"
Issues = "https://github.com/graphblocks/graphblocks/issues"

[tool.hatch.build.targets.wheel]
only-include = ["METAPACKAGE.md"]
