[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "graphblocks-testing"
version = "0.1.0"
description = "Deterministic local testing runtime helpers for GraphBlocks"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
  { name = "GraphBlocks contributors" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = ["graphblocks-core~=1.0"]

[project.optional-dependencies]
production = ["graphblocks-callbacks~=0.1"]

[project.scripts]
graphblocks-tck = "graphblocks_testing:main"

[tool.hatch.build.targets.wheel]
packages = ["src/graphblocks_testing"]
