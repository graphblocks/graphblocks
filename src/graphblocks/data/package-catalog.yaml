catalogVersion: 5
specVersion: '1.0'
defaultSelection:
  artifacts:
  - graphblocks
  components:
  - graphblocks-core
  - graphblocks-stdlib
  - graphblocks-documents
  - graphblocks-rag
  - graphblocks-conversation
  - graphblocks-policy
  - graphblocks-budget
  - graphblocks-usage
  - graphblocks-cli
  excludedCategories:
  - model_provider
  - cloud_sdk
  - database_client
  - document_parser
  - ocr_engine
  - web_server
  - tui
  - kubernetes
  - terraform
  - voice
  - durable_stream
  - external_policy_engine
  - distributed_ledger_backend
  notes:
  - Policy, budget, and usage default components provide only provider-neutral contracts and
    local in-memory/SQLite development implementations.
  - Distributed ledgers, external PDPs, providers, parsers, cloud SDKs, servers, voice, and
    deployment adapters remain optional.
artifacts:
- distribution: graphblocks
  import: graphblocks
  kind: pure_python
  manifest: pyproject.toml
  versionConstraint: ~=0.1
  dependsOn: []
- distribution: graphblocks-runtime
  import: graphblocks_runtime
  kind: native_wheel
  manifest: packages/graphblocks-runtime/pyproject.toml
  versionConstraint: ~=0.1
  dependsOn: []
- distribution: graphblocks-testing
  import: graphblocks_testing
  kind: pure_python
  manifest: packages/graphblocks-testing/pyproject.toml
  versionConstraint: ~=0.1
  dependsOn:
  - graphblocks
- distribution: graphblocks-operator
  import: null
  kind: oci_image_and_helm
  manifest: packages/graphblocks-operator/Chart.yaml
  versionConstraint: ~=0.1
  dependsOn: []
releaseTrains:
  foundation:
    minorVersionCoordinated: true
    components:
    - graphblocks-core
    - graphblocks-runtime
    - graphblocks-stdlib
    - graphblocks-documents
    - graphblocks-rag
    - graphblocks-conversation
    - graphblocks-policy
    - graphblocks-budget
    - graphblocks-usage
    - graphblocks-testing
  firstPartyExtensions:
    minorVersionCoordinated: false
    components:
    - graphblocks-agents
    - graphblocks-evaluation
    - graphblocks-orchestration
    - graphblocks-review
    - graphblocks-workspace
    - graphblocks-client
    - graphblocks-tui
    - graphblocks-cli
    - graphblocks-server
    - graphblocks-worker
    - graphblocks-deployment
    - graphblocks-telemetry
    - graphblocks-devtools
    - graphblocks-oci
    - graphblocks-kubernetes
    - graphblocks-terraform
    - graphblocks-gitops
    - graphblocks-operator
    - graphblocks-otel
    - graphblocks-langfuse
    - graphblocks-audit
    - graphblocks-prometheus
    - graphblocks-dashboards
    compatibilityBy:
    - requires_core
    - requires_runtime_protocol
    - plugin_api
    - schema_api
    - policy_api
    - ledger_api
  integrations:
    minorVersionCoordinated: false
    compatibilityBy:
    - requires_core
    - requires_runtime_protocol
    - plugin_api
    - schema_api
    - policy_api
    - ledger_api
components:
- name: graphblocks-core
  artifact: graphblocks
  import: graphblocks
  layer: schema_authoring
  default: true
  kind: pure_python
  dependsOn: []
  responsibility:
  - canonical AI and cross-domain work schemas
  - GraphSpec/ApplicationSpec/BindingSpec/Release/Deployment schemas
  - policy, evidence, snapshot, ChangeSet, Check/Gate/Review schemas
  - BlockDescriptor SDK and static compiler frontend
  - plugin manifest reader
  implementationPhase: 0
  stability: foundation
- name: graphblocks-runtime
