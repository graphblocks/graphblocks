# Bounded research orchestration with task budget delegation and patch CAS.
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: bounded-research-orchestrator
spec:
  interface:
    inputs:
      objective: company.research/Objective@1
      sources: graphblocks.core/SourceRefList@1
    outputs:
      result: graphblocks.core/ResultBundle@1
  nodes:
    snapshot:
      block: resource.snapshot@1
      inputs: {resources: $input.sources}
    resolveWorkers:
      block: orchestration.resolve_worker_pool@1
      bindings: {modelPool: research-model-pool}
    plan:
      block: orchestration.plan@1
      inputs:
        objective: $input.objective
        workers: resolveWorkers.pool
      config:
        outputSchema: graphblocks.orchestration/TaskPlan@1
        limits:
          maxTasks: 48
          maxDepth: 4
          maxParallelTasks: 8
        phaseBudgets:
          planning: 0.10
          execution: 0.55
          verification: 0.20
          finalization: 0.15
    validate:
      block: orchestration.validate_plan@1
      inputs: {plan: plan.value}
      config:
        requireAcyclicDependencies: true
        requireBoundedRecursion: true
        requireExplicitContextAccess: true
    execute:
      block: orchestration.execute_task_plan@1
      inputs:
        plan: validate.plan
        snapshot: snapshot.value
      config:
        checkpoint: each_task
        reservation: per_task
        onBudgetPressure:
          cancelPriorities: [optional, normal]
          preserve: [required, verification, finalization]
    detectGaps:
      block: research.detect_gaps@1
      inputs: {results: execute.results}
    patch:
      block: orchestration.replan@1
      when: detectGaps.requiresMoreWork
      inputs:
        plan: execute.plan
        gaps: detectGaps.gaps
      config:
        outputSchema: graphblocks.orchestration/TaskPlanPatch@1
        concurrency: compare_and_swap
    verify:
      block: check.run_suite@1
      inputs:
        subject: execute.result
        evidence: execute.evidence
      config:
        checks: [claim_support, source_resolution, contradiction_scan]
        independence: exclude_originating_workers
    gate:
      block: gate.evaluate@1
      inputs: {checks: verify.results}
    bundle:
      block: result.bundle@1
      inputs:
        outputs: [execute.result]
        evidence: execute.evidence
        checks: verify.results
        gate: gate.result
      outputs:
        result: $output.result
