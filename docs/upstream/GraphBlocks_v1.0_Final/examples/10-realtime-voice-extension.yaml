apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: realtime-voice-agent
spec:
  extensions: [graphblocks.voice/v1alpha1]
  execution:
    lifetime: session
    interaction: duplex
    durability: checkpointed
  voice:
    pipeline: {kind: realtime}
    provider:
      adapterId: openai-realtime
      endpoint: https://api.example.com/v1/realtime/sessions
      authSecretRef: secret://providers/openai-realtime
      defaultModel: gpt-realtime
      defaultInstructions: Use concise voice-safe answers.
      options:
        voice: alloy
        temperature: 0.4
    turnDetection:
      authority: provider
      mode: semantic
    localVad:
      enabled: true
      role: metrics_and_early_duck_only
    interruption:
      authority: provider
      policy: adaptive
      onPossible: duck
      onConfirmed: [clear_playout, cancel_response, truncate_conversation]
    playback:
      acknowledgements: required
      reportInterval: 100ms
  nodes:
    session:
      block: realtime.session@1
      bindings: {provider: realtime-provider}
      config:
        transport:
          kind: provider_realtime
          uri: wss://realtime.example.com/v1/sessions
          codec: pcm16
          sampleRateHz: 24000
          channels: 1
    tools:
      block: tools.dispatch@1
      inputs: {calls: session.toolCalls}
      outputs: {results: session.toolResults}
    telemetry:
      block: telemetry.voice_session@1
