    kind: distribution
    path: pyproject.toml
    tier: stable
    readiness: blocked
    stableProfiles: [GB-C0-SCHEMA, GB-C1-LOCAL-RUNTIME]
    exclusions: [GB-C2-AI-APPLICATION, GB-C3-GOVERNED-RUNTIME, GB-C4-PRODUCTION, GB-X1-ORCHESTRATION, GB-X2-VOICE, GB-X3-DURABLE-STREAM, external-integrations]
