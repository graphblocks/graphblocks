name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install pip==25.1.1
          python -m pip install build==1.5.1 hatchling==1.31.0 maturin==1.14.1
          python -m pip install -e ".[test]"
      - name: Verify typed graph contracts
        run: python -m mypy
      - name: Check candidate stable API and CLI snapshots
        run: python tools/check_compatibility.py
      - name: Run Python tests
        run: python -m pytest

  installed-artifacts:
    name: Installed artifacts Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up pinned Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install wheel verification tooling
        run: |
          python -m pip install pip==25.1.1
          python -m pip install build==1.5.1 hatchling==1.31.0 maturin==1.14.1 cyclonedx-bom==7.3.0
          python -m pip install -e ".[test]"
      - name: Build once, install, and run installed-artifact gates
        run: >-
          python tools/verify_wheelhouse.py
          --wheelhouse dist/platform-wheelhouse
          --sdist-dir dist/platform-sdists
          --dependency-wheelhouse dist/platform-dependencies
          --release-evidence-dir dist/platform-evidence
          --sbom-output dist/platform-evidence/sbom.cdx.json
          --platform ${{ matrix.os }}
          --python-version ${{ matrix.python-version }}
          --rustc rustc
      - name: Retain platform release inputs and conformance evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: graphblocks-release-input-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            dist/platform-wheelhouse
            dist/platform-sdists
            dist/platform-evidence
          if-no-files-found: error
          retention-days: 30

  examples:
    name: Examples
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy,rustfmt
          rustup default 1.94.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install pip==25.1.1
          python -m pip install -e ".[test]"
      - name: Verify custom Rust block
        run: |
          cargo fmt --manifest-path examples/12-custom-python-rust-blocks/rust/Cargo.toml -- --check
          cargo clippy --manifest-path examples/12-custom-python-rust-blocks/rust/Cargo.toml --locked --all-targets -- -D warnings
          cargo test --manifest-path examples/12-custom-python-rust-blocks/rust/Cargo.toml --locked
      - name: Run example integration tests
        run: python -m pytest examples/*/test_*.py

  release-ref-gate:
    name: Validate stable release ref
    if: >-
      github.event_name == 'push' &&
      github.repository == 'graphblocks/graphblocks' &&
      startsWith(github.ref, 'refs/tags/v1.0.0')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    env:
      RELEASE_REF_PATTERN: '^refs/tags/v1\.0\.0(-rc\.[1-9][0-9]*)?$'
    outputs:
      release_ref: ${{ steps.release_ref.outputs.release_ref }}
    steps:
      - name: Reject non-canonical stable release refs
        id: release_ref
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF" =~ $RELEASE_REF_PATTERN ]]; then
            echo "::error::release signing requires v1.0.0 or v1.0.0-rc.N with a canonical positive N"
            exit 1
          fi
          printf 'release_ref=%s\n' "$GITHUB_REF" >> "$GITHUB_OUTPUT"

  release-evidence:
    name: Assemble unsigned release artifact and supply-chain evidence
    needs:
      - python
      - installed-artifacts
      - examples
      - rust
      - release-ref-gate
    if: needs.release-ref-gate.outputs.release_ref == github.ref
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install release tooling
        run: |
          python -m pip install pip==25.1.1
          python -m pip install build==1.5.1 hatchling==1.31.0 maturin==1.14.1 cyclonedx-bom==7.3.0
          python -m pip install -e .
      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Download exact supported-platform release inputs
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: graphblocks-release-input-*
          path: dist/platform-inputs
          merge-multiple: false
      - name: Assemble and verify the offline release bundle
        env:
          BUILDER_ID: https://github.com/graphblocks/graphblocks/.github/workflows/ci.yml
          INVOCATION_ID: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
          PROMOTION_EVIDENCE_PATH: docs/project/releases/v1.0.0-promotion-evidence.json
        run: |
          promotion_args=()
          if [[ "$GITHUB_REF" == "refs/tags/v1.0.0" ]]; then
            promotion_args=(--promotion-evidence "$PROMOTION_EVIDENCE_PATH")
          fi
          python tools/release_supply_chain.py assemble \
            --platform-inputs-dir dist/platform-inputs \
            --output-dir dist/release-bundle \
            --git-commit "$GITHUB_SHA" \
            --release-ref "$GITHUB_REF" \
            "${promotion_args[@]}" \
            --builder-id "$BUILDER_ID" \
            --invocation-id "$INVOCATION_ID" \
            --cosign cosign
      - name: Freeze the successful candidate matrix attestation
        if: startsWith(github.ref, 'refs/tags/v1.0.0-rc.')
        env:
          RUN_ATTEMPT_ID: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: >-
          python tools/release_supply_chain.py freeze-candidate-matrix-report
          --output-dir dist/frozen-candidate-matrix-report
          --candidate-ref "$GITHUB_REF"
          --candidate-commit "$GITHUB_SHA"
          --run-id "$RUN_ATTEMPT_ID"
      - name: Retain the exact frozen candidate matrix attestation
        if: startsWith(github.ref, 'refs/tags/v1.0.0-rc.')
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: graphblocks-frozen-candidate-matrix-report
          path: dist/frozen-candidate-matrix-report/report.json
          if-no-files-found: error
          retention-days: 30
      - name: Retain frozen unsigned release bundle
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: graphblocks-unsigned-release-candidate-bundle
          path: dist/release-bundle
          if-no-files-found: error
          retention-days: 30

  candidate-matrix-signing:
    name: Keyless-sign successful candidate matrix attestation
    needs:
      - release-ref-gate
      - release-evidence
    if: >-
      needs.release-ref-gate.outputs.release_ref == github.ref &&
      startsWith(github.ref, 'refs/tags/v1.0.0-rc.')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - name: Download the exact frozen candidate matrix attestation
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: graphblocks-frozen-candidate-matrix-report
          path: dist/signed-candidate-matrix-report
      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Keyless-sign and directly verify the fixed matrix attestation
        env:
          CERTIFICATE_IDENTITY: https://github.com/graphblocks/graphblocks/.github/workflows/ci.yml@${{ needs.release-ref-gate.outputs.release_ref }}
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          cosign sign-blob --yes \
            --bundle dist/signed-candidate-matrix-report/report.sigstore.json \
            dist/signed-candidate-matrix-report/report.json
          cosign verify-blob \
            --bundle dist/signed-candidate-matrix-report/report.sigstore.json \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
            dist/signed-candidate-matrix-report/report.json
      - name: Retain the signed candidate matrix attestation
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: graphblocks-signed-candidate-matrix-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            dist/signed-candidate-matrix-report/report.json
            dist/signed-candidate-matrix-report/report.sigstore.json
          if-no-files-found: error
          retention-days: 90

  release-signing:
    name: Keyless-sign frozen release manifest
    needs:
      - release-ref-gate
      - release-evidence
    if: needs.release-ref-gate.outputs.release_ref == github.ref
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - name: Download exact frozen unsigned release bundle
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: graphblocks-unsigned-release-candidate-bundle
          path: dist/release-bundle
      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Keyless-sign and directly verify the fixed release manifest
        env:
          CERTIFICATE_IDENTITY: https://github.com/graphblocks/graphblocks/.github/workflows/ci.yml@${{ needs.release-ref-gate.outputs.release_ref }}
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          cosign sign-blob --yes \
            --bundle dist/release-bundle/release-manifest.sigstore.json \
            dist/release-bundle/release-manifest.json
          cosign verify-blob \
            --bundle dist/release-bundle/release-manifest.sigstore.json \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
            dist/release-bundle/release-manifest.json
      - name: Retain signed release artifacts, evidence, and attestations
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: graphblocks-release-candidate-bundle
          path: dist/release-bundle
          if-no-files-found: error
          retention-days: 30

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy,rustfmt
          rustup default 1.94.0
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Run Rust tests
        run: cargo test --workspace --all-targets --locked
      - name: Verify Rust packages
        run: |
          cargo package --workspace --locked --allow-dirty --no-verify

          for archive in target/package/*.crate; do
            tar -xzf "$archive" -C target/package
          done

          mapfile -t manifests < <(
            find target/package -mindepth 2 -maxdepth 2 -name Cargo.toml -print | sort
          )
          mkdir -p .cargo
          patch_config=.cargo/config.toml
          printf '[patch.crates-io]\n' > "$patch_config"
          schema_manifest=
          for manifest in "${manifests[@]}"; do
            crate_dir=$(dirname "$manifest")
            crate_name=$(sed -n '/^name = / { s/^name = "//; s/"$//; p; q; }' "$manifest")
            printf "%s = { path = '%s/%s' }\n" "$crate_name" "$PWD" "$crate_dir" >> "$patch_config"
            if [[ "$crate_name" == graphblocks-schema ]]; then
              schema_manifest=$manifest
            fi
          done

          export CARGO_TARGET_DIR="$PWD/target/package/archive-target"
          for manifest in "${manifests[@]}"; do
            if [[ "$manifest" == "$schema_manifest" ]]; then
              continue
            fi
            cargo test --manifest-path "$manifest" --all-targets
          done

          test -n "$schema_manifest"
          cargo test --manifest-path "$schema_manifest" --all-targets
