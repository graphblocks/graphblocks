# LLM-as-an-interviewer benchmark comparing RAG and no-RAG answer paths.
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: rag-interviewer-benchmark
spec:
  interface:
    inputs:
      dataset: graphblocks.evaluation/InterviewDatasetRef@1
    outputs:
      report: graphblocks.evaluation/BenchmarkReport@1
  nodes:
    load:
      block: evaluation.load_interview_dataset@1
      inputs: {dataset: $input.dataset}
    ask:
      block: model.structured_generate@1
      inputs: {reference: load.reference}
      bindings: {model: interviewer-model}
      config:
        role: interviewer
        outputSchema: graphblocks.evaluation/InterviewQuestionSet@1
    retrieve:
      block: retrieve.batch@1
      inputs:
        questions: ask.questions
        corpus: load.chunks
      bindings: {retriever: benchmark-retriever}
      config: {topK: 1}
    ragAnswer:
      block: model.batch_generate@1
      inputs:
        questions: ask.questions
        contexts: retrieve.contexts
      bindings: {model: answer-model}
    noRagAnswer:
      block: model.batch_generate@1
      inputs: {questions: ask.questions}
      bindings: {model: answer-model}
    blind:
      block: evaluation.blind_answer_pairs@1
      inputs:
        rag: ragAnswer.answers
        noRag: noRagAnswer.answers
      config:
        labels: [A, B]
        order: alternate_by_question
    score:
      block: model.structured_generate@1
      inputs:
        questions: ask.questions
        reference: load.reference
        candidates: blind.pairs
      bindings: {model: interviewer-model}
      config:
        role: interviewer
        blind: true
        scale: {minimum: 0, maximum: 1}
        outputSchema: graphblocks.evaluation/InterviewScoreSet@1
    aggregate:
      block: evaluation.compare_variants@1
      inputs:
        scores: score.scores
        mapping: blind.mapping
      config:
        candidate: rag
        baseline: no_rag
        constraints:
          ragScoreDelta: {atLeast: 0.20}
          ragWinRate: {atLeast: 0.67}
      outputs: {report: $output.report}
---
apiVersion: graphblocks.ai/v1alpha1
kind: Binding
metadata:
  name: rag-interviewer-benchmark-local
spec:
  resources:
    interviewer-model:
      kind: ChatModel
      implementation: graphblocks.scripted
      config: {model: scripted-interviewer-v1, temperature: 0}
    answer-model:
      kind: ChatModel
      implementation: graphblocks.scripted
      config: {model: scripted-answer-v1, temperature: 0}
    benchmark-retriever:
      kind: Retriever
      implementation: graphblocks.in_memory_chunks
