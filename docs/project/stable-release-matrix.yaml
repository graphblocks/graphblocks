matrixVersion: 1
targetRelease: '1.0'
currentReadiness: blocked
compatibilityPolicy: ../specification/reference/compatibility-policy.md
diagnosticRegistry: ../specification/reference/diagnostic-codes.yaml
tierDefinitions:
  stable: Compatibility promise after every applicable release gate passes.
  preview: Shipped for evaluation; documented breaking changes may occur in a minor release.
  internal: Build or verification implementation with no supported public API.
  reserved: Name or future surface only; no usable implementation or compatibility promise.

