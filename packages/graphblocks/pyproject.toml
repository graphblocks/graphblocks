[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "graphblocks"
version = "0.1.0"
description = "Provider-neutral default GraphBlocks metapackage"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
  { name = "GraphBlocks contributors" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "graphblocks-core~=1.0",
  "graphblocks-runtime~=1.0",
  "graphblocks-stdlib~=1.0",
  "graphblocks-documents~=1.0",
  "graphblocks-rag~=1.0",
  "graphblocks-conversation~=1.0",
  "graphblocks-policy~=1.0",
  "graphblocks-budget~=1.0",
  "graphblocks-usage~=1.0",
  "graphblocks-cli~=1.0",
]

[tool.hatch.build.targets.wheel]
only-include = ["METAPACKAGE.md"]
