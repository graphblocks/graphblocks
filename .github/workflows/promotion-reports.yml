name: Promotion report signing

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: Closed promotion-report contract to validate and sign
        required: true
        type: choice
        options:
          - candidate-manifest
          - soak-application
          - api-review
          - security-review
          - stable-scope
          - protected-final-ref
          - staged-rehearsal
      report_json:
        description: Public JSON report content; the validation job canonicalizes it
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.report_type }}
  cancel-in-progress: false

jobs:
  validate-report:
    name: Validate and freeze candidate promotion report
    if: >-
      github.repository == 'graphblocks/graphblocks' &&
      startsWith(github.ref, 'refs/tags/v1.0.0-rc.')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      candidate_ref: ${{ steps.candidate.outputs.candidate_ref }}
    steps:
      - name: Admit the exact candidate tag
        id: candidate
        shell: bash
        env:
          RELEASE_CANDIDATE_REF_PATTERN: '^refs/tags/v1\.0\.0-rc\.[1-9][0-9]*$'
        run: |
          if [[ ! "$GITHUB_REF" =~ $RELEASE_CANDIDATE_REF_PATTERN ]]; then
            echo "::error::promotion reports require a canonical v1.0.0-rc.N workflow-dispatch ref"
            exit 1
          fi
          printf 'candidate_ref=%s\n' "$GITHUB_REF" >> "$GITHUB_OUTPUT"
      - name: Check out the candidate source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install report validation dependencies
        run: |
          python -m pip install pip==25.1.1
          python -m pip install hatchling==1.31.0
          python -m pip install -e .
      - name: Validate and freeze the public report
        env:
          PROMOTION_REPORT_JSON: ${{ inputs.report_json }}
        run: |
          mkdir -p dist/promotion-report-input
          printf '%s' "$PROMOTION_REPORT_JSON" > dist/promotion-report-input/report.json
          python tools/release_supply_chain.py freeze-promotion-report \
            --input dist/promotion-report-input/report.json \
            --output-dir dist/frozen-promotion-report \
            --report-type "${{ inputs.report_type }}" \
            --candidate-ref "$GITHUB_REF" \
            --candidate-commit "$GITHUB_SHA"
      - name: Retain the exact frozen report for the signing boundary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: graphblocks-frozen-promotion-report
          path: dist/frozen-promotion-report/report.json
          if-no-files-found: error
          retention-days: 30

  sign-report:
    name: Keyless-sign frozen candidate promotion report
    needs:
      - validate-report
    if: needs.validate-report.outputs.candidate_ref == github.ref
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - name: Download the exact frozen report
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: graphblocks-frozen-promotion-report
          path: dist/signed-promotion-report
      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Keyless-sign and directly verify the fixed promotion report
        env:
          CERTIFICATE_IDENTITY: https://github.com/graphblocks/graphblocks/.github/workflows/promotion-reports.yml@${{ needs.validate-report.outputs.candidate_ref }}
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          cosign sign-blob --yes \
            --bundle dist/signed-promotion-report/report.sigstore.json \
            dist/signed-promotion-report/report.json
          cosign verify-blob \
            --bundle dist/signed-promotion-report/report.sigstore.json \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
            dist/signed-promotion-report/report.json
      - name: Retain the signed promotion report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: graphblocks-signed-promotion-report-${{ inputs.report_type }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/signed-promotion-report
          if-no-files-found: error
          retention-days: 90
