integrationRules:
  importPattern: graphblocks.integrations.<technology>
  sharedGraphblocksNamespace: true
  discovery: Python entry points plus static graphblocks-plugin.json
  eagerProviderImport: false
  mustNotDependOn:
  - unrelated integrations
  policyDiscovery: entry points plus signed PolicyBundle manifest
  externalPolicyEnginesOptional: true
  distributedLedgersOptional: true
  componentPattern: graphblocks-<technology>
extensionComponents:
  voice:
  - graphblocks-voice
  - graphblocks-webrtc
  - graphblocks-websocket-media
