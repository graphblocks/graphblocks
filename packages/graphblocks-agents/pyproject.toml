[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "graphblocks-agents"
version = "0.1.0"
description = "Agent tool resolution and execution planning contracts for GraphBlocks"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
  { name = "GraphBlocks contributors" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = [
  "graphblocks-core~=0.1",
  "graphblocks-conversation~=0.1",
  "graphblocks-policy~=0.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/graphblocks_agents"]
