[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "graphblocks-testing"
version = "1.0.0rc1"
description = "Deterministic local testing runtime helpers for GraphBlocks"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
  { name = "GraphBlocks contributors" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = ["graphblocks>=1.0.0rc1,<2"]

[project.optional-dependencies]
runtime = [
  "graphblocks-runtime>=0.1,<0.2",
]

[project.scripts]
graphblocks-tck = "graphblocks_testing:main"

[project.urls]
Homepage = "https://github.com/graphblocks/graphblocks"
Documentation = "https://github.com/graphblocks/graphblocks/tree/main/docs"
Source = "https://github.com/graphblocks/graphblocks"
Issues = "https://github.com/graphblocks/graphblocks/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/graphblocks_testing"]

[tool.hatch.build.targets.sdist]
include = [
  "src/graphblocks_testing",
  "pyproject.toml",
]
