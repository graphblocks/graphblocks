  - id: GB-C1-LOCAL-RUNTIME
    implementation: python-reference
    tier: stable
    readiness: blocked
    extends: [GB-C0-SCHEMA]
    requiredGates: [REL-API-SNAPSHOT, REL-RUNTIME-CORRECTNESS, REL-INSTALLED-TCK]
