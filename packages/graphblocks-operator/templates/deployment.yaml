apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "graphblocks-operator.controllerName" . }}
  labels:
    app.kubernetes.io/name: graphblocks-operator
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: graphblocks-operator
      app.kubernetes.io/component: controller
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphblocks-operator
        app.kubernetes.io/component: controller
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        graphblocks.ai/operator-release-id: {{ .Values.controller.releaseId | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "graphblocks-operator.serviceAccountName" . | quote }}
      containers:
        - name: graphblocks-operator-controller
          image: "{{ .Values.image.repository }}{{- if .Values.image.digest }}@{{ .Values.image.digest }}{{- else }}:{{ .Values.image.tag }}{{- end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          args:
            - "--watch-graphdeployments=true"
            - "--watch-graphreleases=true"
            - "--watch-namespaces=$(GRAPHBLOCKS_WATCH_NAMESPACES)"
          env:
            - name: GRAPHBLOCKS_OPERATOR_RELEASE_ID
              value: {{ .Values.controller.releaseId | quote }}
            - name: GRAPHBLOCKS_WATCH_NAMESPACES
              value: {{ default .Release.Namespace (join "," .Values.controller.watchNamespaces) | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
