apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: knowledge-ingestion-job
spec:
  execution:
    lifetime: job
    durability: durable
  interface:
    inputs:
      previousSnapshot: graphblocks.documents/SourceSnapshotRef@1
    outputs:
      report: graphblocks.documents/IngestionReport@1
  nodes:
    snapshot:
      block: asset.snapshot_source@1
      bindings: {source: company-drive}
    diff:
      block: asset.diff_snapshot@1
      inputs:
        current: snapshot.assets
        previous: $input.previousSnapshot
    process:
      block: control.map@2
      inputs: {items: diff.changed}
      config:
        graph: graphs/process-single-asset.yaml
        itemKey: $.revision_id
        concurrency: 16
        stateIsolation: item
        checkpoint: per_item
        onError: collect
        batch:
          maxItems: 32
          maxBytes: 8388608
          maxWait: 500ms
    delete:
      block: control.map@2
      inputs: {items: diff.deleted}
      config:
        graph: graphs/delete-single-asset.yaml
        itemKey: $.revision_id
        concurrency: 8
        checkpoint: per_item
        onError: collect
    report:
      block: ingestion.build_report@1
      inputs:
        processed: process.outcomes
        deleted: delete.outcomes
---
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: process-single-asset
spec:
  nodes:
    begin:
      block: ingestion.begin_revision@1
    cache:
      block: processing.cache_lookup@1
      inputs:
        assetChecksum: $input.asset.checksum
        pipelineLock: $execution.release.packageLockHash
    load:
      block: asset.load@1
      when: cache.miss
    convert:
      block: document.convert@1
      inputs: {asset: load.value}
      config:
        strategy: locked_auto
        candidates:
          application/pdf:
            - {implementation: parser.pdf.primary, version: "1"}
            - {implementation: parser.pdf.fallback, version: "1"}
        qualityGate: document.default-quality-v1
    quality:
      block: document.assess_quality@1
      inputs: {document: convert.document}
    ocr:
      block: document.ocr@1
      when: quality.requiresOcr
      inputs: {document: convert.document}
    select:
      block: control.select@1
      inputs:
        cases:
          ocr: ocr.document
          parsed: convert.document
    normalize:
      block: document.normalize@1
      inputs: {document: select.value}
    redact:
      block: document.redact@1
      inputs: {document: normalize.document}
    split:
      block: document.split@1
      inputs: {document: redact.document}
    persist:
      block: ingestion.persist_staging@1
      inputs:
        transaction: begin.transaction
        document: redact.document
        chunks: split.chunks
      bindings:
        artifacts: document-artifacts
        manifests: document-manifests
        index: knowledge-index-staging
    commit:
      block: ingestion.commit_revision@1
      inputs:
        transaction: begin.transaction
        staged: persist.result
