apiVersion: graphblocks.ai/v1alpha1
kind: PolicyProfileSet
metadata:
  name: standard-usage-governance-profiles
  version: 1.0.0
spec:
  profiles:
    assistant-output-standard:
      description: Bounded-holdback assistant output streaming policy with mandatory
        generation, client-delivery, and durable-commit enforcement points.
      outputStreaming:
        delivery:
          mode: bounded_holdback
          holdbackMaxTokens: 48
          holdbackMaxDuration: 250ms
          flushBoundaries:
          - sentence
          - paragraph
          - tool_call
        evaluation:
          enforcementPoints:
          - on_generation_chunk
          - before_client_delivery
          - before_output_commit
          evaluators:
          - policy.rules
          - content.classifier
          - pii.detector
          maximumUnevaluatedTokens: 32
          maximumEvaluationInterval: 150ms
        onViolation:
          disposition: abort_response
          providerCancellation:
            mode: request
          pendingToolCalls:
            disposition: deny
          deliveredDraft:
            disposition: retract
          durableResult:
            disposition: none
          replacement:
            kind: message_ref
            ref: messages/output-policy-blocked
    interactive-finish-current-turn:
      description: Stop admission for the next turn, but complete the already admitted
        turn within a bounded continuation permit and completion reserve.
      exhaustion:
        preset: finish_current_turn
        denyNewWork: true
        inFlight: finish_current_unit
        unit: turn
        continuation:
          allowedWork:
          - already_admitted_child_work
          - declared_finalization
          - checkpoint
          - cleanup
          forbiddenWork:
          - new_turn
          - plan_expansion
          - optional_task
          - new_trial
          - state_changing_effect
          - unreserved_provider_call
          maxAdditionalUsage:
          - kind: model_output_tokens
            quantity: 4000
            unit: token
          - kind: wall_time_ms
            quantity: 600000
            unit: ms
          maxAdditionalSteps: 2
          deadline: 10m
        output:
          clientDelivery: continue_to_boundary
          durableResult: commit_with_exhaustion_notice
        effects: preserve_atomicity
        afterUnit: reject
    interactive-hard-stop:
      description: Stop new admission and client delivery at the nearest local safe
        point, request cooperative cancellation, and reconcile late provider usage.
      exhaustion:
        preset: hard_stop
        denyNewWork: true
        inFlight: cancel_immediately
        unit: provider_call
        continuation:
          allowedWork:
          - cleanup
          forbiddenWork:
          - new_turn
          - plan_expansion
          - optional_task
          - new_trial
          - state_changing_effect
          - unreserved_provider_call
        maxOverdraft: []
        output:
          clientDelivery: stop_immediately
          durableResult: retract
        effects: preserve_atomicity
        afterUnit: reject
    agent-finish-step:
      exhaustion:
        preset: finish_current_step
        denyNewWork: true
        inFlight: finish_current_unit
        unit: agent_step
        continuation:
          allowedWork:
          - current_provider_call
          - checkpoint
          - cleanup
          forbiddenWork:
          - plan_expansion
          - state_changing_effect
          - unreserved_provider_call
          maxAdditionalSteps: 1
          deadline: 2m
        output:
          clientDelivery: continue_to_boundary
          durableResult: mark_incomplete
        afterUnit: pause
    durable-checkpoint-pause:
      exhaustion:
        preset: checkpoint_and_pause
        denyNewWork: true
        inFlight: checkpoint_then_pause
        unit: map_item
        continuation:
          allowedWork:
          - checkpoint
          - cleanup
          forbiddenWork:
          - new_trial
          - optional_task
          - state_changing_effect
          deadline: 5m
        output:
          clientDelivery: stop_immediately
          durableResult: mark_incomplete
        effects: preserve_atomicity
        afterUnit: pause
    research-degrade-then-finalize:
      thresholds:
      - at: 0.8
        actions:
        - reduce_parallelism
      - at: 0.9
        actions:
        - prefer_economy_model
        - stop_optional_tasks
      exhaustion:
        preset: degrade_then_finalize
        denyNewWork: true
        inFlight: degrade_and_continue
        unit: task
        continuation:
          allowedWork:
          - declared_finalization
          - checkpoint
          - cleanup
          forbiddenWork:
          - plan_expansion
          - optional_task
          - new_trial
          - state_changing_effect
          maxAdditionalSteps: 2
          deadline: 5m
        output:
          clientDelivery: buffer_until_commit
          durableResult: commit_with_exhaustion_notice
        afterUnit: close
