# Governed RTL workspace trial with checks, review, leases, and CAS commit.
# RTL/Verilog types are application-local fixtures for generic workspace/check/gate contracts.
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: verified-rtl-repair
spec:
  interface:
    inputs:
      objective: company.hdl/RepairObjective@1
      workspace: graphblocks.workspace/WorkspaceRef@1
    outputs:
      proposal: graphblocks.workspace/ChangeProposal@1
  nodes:
    snapshot:
      block: workspace.snapshot@1
      inputs: {workspace: $input.workspace}
    baseline:
      block: check.run_suite@1
      inputs: {subject: snapshot.value}
      config:
        checks: [lint, compile, regression, formal, synthesis]
    diagnose:
      block: agent.run@1
      inputs:
        objective: $input.objective
        diagnostics: baseline.diagnostics
    candidates:
      block: model.structured_generate@1
      inputs: {diagnosis: diagnose.result}
      config:
        outputSchema: company.hdl/PatchCandidateSet@1
    trials:
      block: control.map@2
      inputs: {items: candidates.value}
      config:
        graph: evaluate-rtl-candidate
        itemKey: $.candidate_id
        concurrency: 4
        stateIsolation: item
        checkpoint: per_item
        onError: collect
    select:
      block: candidate.select@1
      inputs: {trials: trials.outcomes}
      config:
        hardConstraints:
          - lint_passed
          - compile_passed
          - regression_passed
          - formal_not_failed
        objectives:
          - {metric: area, direction: minimize}
          - {metric: worst_slack, direction: maximize}
          - {metric: power, direction: minimize}
        strategy: pareto_then_weighted
    review:
      block: review.request@1
      inputs: {subject: select.changeSet}
      config:
        scope: design_intent
        invalidateOnSubjectChange: true
    verifyTrial:
      block: trial.plan_commit@1
      inputs:
        changeSet: select.changeSet
        checks: select.checks
        gate: select.gate
        leases: select.leases
        review: review.record
      config:
        requiredChecks: [lint, compile, regression, formal]
        requiredLeaseKinds: [eda.formal]
        requiredReviewScopes: [design_intent]
    commit:
      block: workspace.commit_changeset@1
      when: verifyTrial.ready
      inputs:
        workspace: $input.workspace
        base: snapshot.value
        request: verifyTrial.commitRequest
      config: {concurrency: compare_and_swap}
      outputs:
        result: $output.proposal
---
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: evaluate-rtl-candidate
spec:
  nodes:
    reserve:
      block: budget.reserve@1
      config:
        limits:
          - {kind: cpu_seconds, quantity: 3600, unit: second}
          - {kind: licensed_resource_seconds, quantity: 900, unit: second}
    fork:
      block: workspace.fork@1
      execution: {requires: {isolation: sandbox}}
    apply:
      block: workspace.apply_changeset@1
    fast:
      block: check.run_suite@1
      config:
        checks: [lint, compile, smoke_simulation]
        stopOnFailure: true
    formal:
      block: check.run_suite@1
      when: fast.passed
      flow: {leasePool: formal-license}
      config: {checks: [formal_properties]}
    synthesis:
      block: check.run_suite@1
      when: formal.hardGatePassed
      flow: {leasePool: synthesis-license}
      config: {checks: [synthesis, timing, area, power_estimation]}
    gate:
      block: gate.evaluate@1
      inputs:
        checks: [fast.results, formal.results, synthesis.results]
      policies:
        integrity: trusted-oracle-unchanged
    seal:
      block: trial.seal_result@1
      inputs:
        changeSet: apply.changeSet
        checks: [fast.results, formal.results, synthesis.results]
        leases: reserve.leases
        gate: gate.result
      outputs:
        changeSet: $output.changeSet
        checks: $output.checks
        leases: $output.leases
        gate: $output.gate
