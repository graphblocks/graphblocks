name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling maturin
          python -m pip install -e ".[test]"
      - name: Run Python tests
        run: python -m pytest
      - name: Build and install first-party wheelhouse
        if: matrix.python-version == '3.11'
        run: |
          python tools/verify_wheelhouse.py --wheelhouse dist/wheelhouse

  examples:
    name: Examples
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy,rustfmt
          rustup default 1.94.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Verify custom Rust block
        run: |
          cargo fmt --manifest-path examples/12-custom-python-rust-blocks/rust/Cargo.toml -- --check
          cargo clippy --manifest-path examples/12-custom-python-rust-blocks/rust/Cargo.toml --locked --all-targets -- -D warnings
          cargo test --manifest-path examples/12-custom-python-rust-blocks/rust/Cargo.toml --locked
      - name: Run example integration tests
        run: python -m pytest examples/*/test_*.py

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy,rustfmt
          rustup default 1.94.0
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Run Rust tests
        run: cargo test --workspace --all-targets --locked
      - name: Verify Rust packages
        run: |
          cargo package --workspace --locked --allow-dirty --no-verify

          for archive in target/package/*.crate; do
            tar -xzf "$archive" -C target/package
          done

          mapfile -t manifests < <(
            find target/package -mindepth 2 -maxdepth 2 -name Cargo.toml -print | sort
          )
          patches=()
          schema_manifest=
          for manifest in "${manifests[@]}"; do
            crate_dir=$(dirname "$manifest")
            crate_name=$(sed -n '/^name = / { s/^name = "//; s/"$//; p; q; }' "$manifest")
            patches+=(--config "patch.crates-io.${crate_name}.path='${PWD}/${crate_dir}'")
            if [[ "$crate_name" == graphblocks-schema ]]; then
              schema_manifest=$manifest
            fi
          done

          export CARGO_TARGET_DIR="$PWD/target/package/archive-target"
          for manifest in "${manifests[@]}"; do
            if [[ "$manifest" == "$schema_manifest" ]]; then
              continue
            fi
            cargo test --manifest-path "$manifest" --all-targets "${patches[@]}"
          done

          test -n "$schema_manifest"
          cargo test --manifest-path "$schema_manifest" --all-targets "${patches[@]}"
