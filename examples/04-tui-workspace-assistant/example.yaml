# TUI workspace assistant exposed through the application protocol.
apiVersion: graphblocks.ai/v1alpha1
kind: Application
metadata:
  name: workspace-assistant
spec:
  surfaces:
    default:
      kind: tui
      implementation: textual
      protocol: graphblocks.app.v1
  graphs:
    default: workspace-agent
  capabilities:
    - assistant_drafts
    - approval
    - run_cancellation
    - artifact_preview
    - breakpoint_resume
---
apiVersion: graphblocks.ai/v1alpha3
kind: Graph
metadata:
  name: workspace-agent
spec:
  composition:
    apiVersion: graphblocks.ai/composition/v1alpha1
    imports:
      workspace:
        path: ./fragments/workspace-context.yaml
      assistant:
        path: ./fragments/assistant-turn.yaml
    slots:
      workspace-context:
        interface:
          inputs:
            workspace: graphblocks.workspace/WorkspaceRef@1
            selection: company.workspace/Selection@1
            message: graphblocks.ai/Message@1
          outputs:
            context: graphblocks.ai/ContextPack@1
        fill:
          fragment: workspace/workspace-context
      assistant-turn:
        interface:
          inputs:
            messages: company.workspace/MessageHistory@1
            context: graphblocks.ai/ContextPack@1
          outputs:
            result: graphblocks.ai/TurnResult@1
        fill:
          fragment: assistant/assistant-turn
  interface:
    inputs:
      turn: company.workspace/TurnRequest@1
    outputs:
      result: graphblocks.ai/TurnResult@1
    events:
      - graphblocks.app/AssistantDraftDelta@1
      - graphblocks.app/ApprovalRequested@1
      - graphblocks.workspace/FilePatchPreview@1
  nodes:
    prepare:
      slot: workspace-context
      inputs:
        workspace: $input.turn.workspace
        selection: $input.turn.selection
        message: $input.turn.message
    respond:
      slot: assistant-turn
      inputs:
        messages: $input.turn.history
        context: prepare.context
      outputs: {result: $output.result}
