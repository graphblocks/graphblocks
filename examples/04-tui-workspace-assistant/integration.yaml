apiVersion: graphblocks.ai/examples/v1alpha1
kind: ExampleIntegration
metadata:
  name: tui-workspace-assistant-integration
spec:
  mockGraph:
    graph: workspace-agent
    inputs:
      turn:
        workspace: workspace-demo
        selection: src/main.py:1-20
        message: Explain this function and propose a safe rename.
        history: [{role: user, text: Keep the patch small.}]
    nodes:
      snapshot:
        service: mock-workspace-api
        expectedInputs: {workspace: workspace-demo}
        outputs:
          value: {workspaceId: workspace-demo, revision: 7, digest: sha256:workspace-demo}
      context:
        service: workspace-context
        expectedInputs:
          selection: src/main.py:1-20
          message: Explain this function and propose a safe rename.
          snapshot: {workspaceId: workspace-demo, revision: 7}
        outputs:
          pack: {selection: src/main.py:1-20, symbol: load_config, revision: 7}
      agent:
        service: scripted-llm
        expectedInputs:
          context: {symbol: load_config, revision: 7}
        scriptedResponse: Rename load_config to load_project_config and update its two call sites.
        responseField: result
      candidate:
        service: conversation-store
        expectedInputs:
          agent: Rename load_config to load_project_config and update its two call sites.
        outputs:
          result:
            status: draft
            message: Rename load_config to load_project_config and update its two call sites.
            baseRevision: 7
    expectedCallOrder: [snapshot, context, agent, candidate]
    expectedOutput:
      result:
        status: draft
        message: Rename load_config to load_project_config and update its two call sites.
        baseRevision: 7
