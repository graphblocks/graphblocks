registryVersion: 1
codePattern: '^GB[0-9]{4}$'
authority: docs/specification/reference/diagnostic-codes.yaml
statusValues: [candidate, active, deprecated, retired]
tierValues: [stable, preview, internal]
stableReleaseRules:
  - Every diagnostic emitted by a stable surface is present in this registry.
  - Every stable entry has status active before the 1.0 release candidate.
  - One code identifies one invariant-level meaning and one default severity.
  - Codes are never deleted or reused; removed codes remain with status retired.
  - Named preview diagnostics receive a numeric allocation before their surface is promoted.
  - A code allocation and its positive and negative fixture land with the emitting change.
ranges:
  - {range: GB0000-GB0999, owner: schema-and-resource-validation}
  - {range: GB1000-GB1999, owner: graph-compiler-and-local-runtime}
  - {range: GB2000-GB2999, owner: plugins-and-block-catalog}
  - {range: GB3000-GB3999, owner: stable-conformance-testing}
  - {range: GB4000-GB5999, owner: reserved}
  - {range: GB6000-GB6999, owner: production-async-and-callbacks}
  - {range: GB7000-GB7999, owner: remote-boundary-and-production-provenance}
  - {range: GB8000-GB8999, owner: reserved}
  - {range: GB9000-GB9999, owner: internal-tooling}

